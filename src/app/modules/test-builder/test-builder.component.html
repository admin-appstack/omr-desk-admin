<div class="module-container">
  <div class="module-hero purple">
    <div class="hero-content">
      <div class="hero-icon"><i class="fa-thin fa-file-lines"></i></div>
      <div>
        <h1>Test Builder</h1>
        <p>Configure exam parameters, marking schemes, and generate OMR/Online tests.</p>
      </div>
    </div>
    <div class="hero-actions">
      <button mat-stroked-button class="hero-btn-outline">
        <i class="fa-thin fa-file-arrow-down"></i> Templates
      </button>
      <button mat-raised-button class="hero-btn">
        <i class="fa-thin fa-plus"></i> Create New Test
      </button>
    </div>
  </div>

  <!-- Stats Strip -->
  <div class="stats-strip">
    <div class="strip-stat" *ngFor="let s of testStats">
      <i [class]="s.icon" [style.color]="s.color"></i>
      <div>
        <span class="strip-value">{{s.value}}</span>
        <span class="strip-label">{{s.label}}</span>
      </div>
    </div>
  </div>

  <!-- Test Grid -->
  <div class="test-grid">
    <mat-card *ngFor="let test of tests" class="test-card">
      <div class="test-type-badge" [class]="test.type.toLowerCase()">
        <i class="fa-thin" [class]="test.type === 'fa-thin OMR' ? 'fa-thin fa-qrcode' : 'fa-thin fa-desktop'"></i>
        {{test.type}}
      </div>
      <h3 class="test-name">{{test.name}}</h3>
      <div class="test-meta">
        <div class="meta-item">
          <i class="fa-thin fa-clock"></i>
          <span>{{test.duration}} mins</span>
        </div>
        <div class="meta-item">
          <i class="fa-thin fa-circle-question"></i>
          <span>{{test.questions}} Questions</span>
        </div>
        <div class="meta-item">
          <i class="fa-thin fa-users"></i>
          <span>{{test.students}} Students</span>
        </div>
      </div>
      <div class="test-footer">
        <button mat-button color="primary" class="edit-btn">
          <i class="fa-thin fa-pen"></i> Edit
        </button>
        <button mat-icon-button color="accent" matTooltip="Generate OMR Sheet">
          <i class="fa-thin fa-file-lines"></i>
        </button>
        <button mat-icon-button matTooltip="More options">
          <i class="fa-thin fa-ellipsis-vertical"></i>
        </button>
      </div>
    </mat-card>

    <!-- Add New Card -->
    <div class="add-test-card" (click)="createTest()">
      <i class="fa-thin fa-circle-plus"></i>
      <span>Create New Test</span>
    </div>
  </div>
</div>
