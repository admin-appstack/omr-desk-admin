<div class="page-grid">
  <mat-card *ngFor="let page of pages" class="page-card" [class.unpublished]="!page.isPublished">
    <div class="card-header">
      <div class="page-icon" [ngClass]="{'active': page.isPublished}">
        <mat-icon>{{page.icon}}</mat-icon>
      </div>
      <div class="page-status">
        <mat-slide-toggle [(ngModel)]="page.isPublished" color="primary"></mat-slide-toggle>
        <span class="status-label" [class.active]="page.isPublished">
          {{ page.isPublished ? 'Published' : 'Draft' }}
        </span>
      </div>
    </div>
    
    <div class="card-body">
      <h4>{{page.name}}</h4>
      <p class="last-updated">Last updated: 2 days ago</p>
    </div>

    <div class="card-footer">
      <button mat-flat-button class="edit-btn" (click)="openEditDialog(page)">
        <mat-icon>edit_square</mat-icon> Edit Content
      </button>
      <button mat-icon-button class="settings-btn" title="Page Settings" (click)="openSettingsDialog(page)">
        <mat-icon>settings</mat-icon>
      </button>
    </div>
  </mat-card>

  <mat-card class="add-page-card">
    <div class="add-icon-wrapper">
      <mat-icon>add</mat-icon>
    </div>
    <span>Create New Page</span>
  </mat-card>
</div>
