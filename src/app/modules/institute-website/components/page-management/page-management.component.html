<div class="page-grid">

  <!-- Loading State: spans all columns, disappears once data arrives -->
  <div *ngIf="isLoading" class="loading-state">
    <mat-spinner diameter="40"></mat-spinner>
    <p>Loading pages...</p>
  </div>

  <!-- Page cards — rendered directly, *ngFor renders nothing while pages=[] -->
  <mat-card *ngFor="let page of pages" class="page-card" [class.unpublished]="!page.isPublished">
    <div class="card-header">
      <div class="page-icon" [ngClass]="{'active': page.isPublished}">
        <i [class]="page.icon"></i>
      </div>
      <div class="page-status">
        <!-- Use [(ngModel)] so the toggle reflects actual state cleanly -->
        <mat-slide-toggle
          [(ngModel)]="page.isPublished"
          (ngModelChange)="onTogglePublished(page)"
          [disabled]="isToggling(page.pageName)"
          color="primary">
        </mat-slide-toggle>
        <div class="status-text-wrapper">
          <span class="status-label" [class.active]="page.isPublished">
            {{ page.isPublished ? 'Published' : 'Draft' }}
          </span>
          <mat-spinner *ngIf="isToggling(page.pageName)" diameter="14"></mat-spinner>
        </div>
      </div>
    </div>

    <div class="card-body">
      <h4>{{page.displayName}}</h4>
      <p class="last-updated">Last updated: {{ getTimeAgo(page.updatedAt) }}</p>
    </div>

    <div class="card-footer">
      <button mat-flat-button class="edit-btn" (click)="openEditDialog(page)">
        <i class="fa-thin fa-pen-to-square"></i> Edit Content
      </button>
      <button mat-icon-button class="settings-btn" title="Page Settings" (click)="openSettingsDialog(page)">
        <i class="fa-thin fa-gear"></i>
      </button>
    </div>
  </mat-card>

</div>
