<div class="settings-dialog">
  <div class="dialog-header">
    <div class="header-left">
      <div class="tpl-badge">{{data.templateName}}</div>
      <h2>Template Settings</h2>
    </div>
    <button mat-icon-button mat-dialog-close><i class="fa-thin fa-xmark"></i></button>
  </div>

  <mat-tab-group [(selectedIndex)]="activeTab">
    <!-- BRANDING -->
    <mat-tab>
      <ng-template mat-tab-label>
        <i class="fa-thin fa-building"></i>
        <span>Branding</span>
      </ng-template>
      <div class="tab-content">
        <div class="form-section">
          <label>Institute Identity</label>
          <div class="input-grid">
            <mat-form-field appearance="outline">
              <mat-label>Institute Name</mat-label>
              <input matInput [(ngModel)]="config.name">
              <i class="fa-thin fa-building" matSuffix></i>
            </mat-form-field>
            <mat-form-field appearance="outline">
              <mat-label>Tagline</mat-label>
              <input matInput [(ngModel)]="config.tagline">
              <i class="fa-thin fa-wand-magic-sparkles" matSuffix></i>
            </mat-form-field>
          </div>
        </div>
      </div>
    </mat-tab>

    <!-- APPEARANCE -->
    <mat-tab>
      <ng-template mat-tab-label>
        <i class="fa-thin fa-palette"></i>
        <span>Appearance</span>
      </ng-template>
      <div class="tab-content">
        <div class="form-section">
          <label class="section-label">Quick Presets</label>
          <div class="preset-row">
            <div *ngFor="let p of themePresets" class="preset-card" (click)="applyPreset(p)">
              <div class="p-strip" [style.background]="p.p"></div>
              <div class="s-strip" [style.background]="p.s"></div>
              <div class="a-strip" [style.background]="p.a"></div>
            </div>
          </div>
        </div>

        <div class="color-control-grid">
          <div class="color-control-item">
            <label>Primary Color</label>
            <div class="input-with-swatch">
              <div class="swatch" [style.background]="config.primaryColor">
                <input type="color" [(ngModel)]="config.primaryColor">
              </div>
              <input type="text" [(ngModel)]="config.primaryColor" class="hex-text">
            </div>
            <span class="help-text">Main brand color for buttons and links</span>
          </div>

          <div class="color-control-item">
            <label>Secondary Color</label>
            <div class="input-with-swatch">
              <div class="swatch" [style.background]="config.secondaryColor">
                <input type="color" [(ngModel)]="config.secondaryColor">
              </div>
              <input type="text" [(ngModel)]="config.secondaryColor" class="hex-text">
            </div>
            <span class="help-text">Used for gradients and accents</span>
          </div>

          <div class="color-control-item">
            <label>Accent Color</label>
            <div class="input-with-swatch">
              <div class="swatch" [style.background]="config.accentColor">
                <input type="color" [(ngModel)]="config.accentColor">
              </div>
              <input type="text" [(ngModel)]="config.accentColor" class="hex-text">
            </div>
            <span class="help-text">Highlights and call-to-actions</span>
          </div>

          <div class="color-control-item">
            <label>Background Color</label>
            <div class="input-with-swatch">
              <div class="swatch" [style.background]="config.backgroundColor">
                <input type="color" [(ngModel)]="config.backgroundColor">
              </div>
              <input type="text" [(ngModel)]="config.backgroundColor" class="hex-text">
            </div>
            <span class="help-text">Page background color</span>
          </div>
        </div>

        <div class="form-section">
          <label>Typography</label>
          <div class="font-selector">
            <mat-button-toggle-group [(ngModel)]="config.fontFamily" aria-label="Font Family">
              <mat-button-toggle *ngFor="let f of fontFamilies" [value]="f.value">
                {{f.name}}
              </mat-button-toggle>
            </mat-button-toggle-group>
          </div>
        </div>
      </div>
    </mat-tab>

    <!-- GENERAL / DOMAIN -->
    <mat-tab>
      <ng-template mat-tab-label>
        <i class="fa-thin fa-globe"></i>
        <span>Domain & Support</span>
      </ng-template>
      <div class="tab-content">
        <div class="form-section">
          <label>Website URL</label>
          <mat-form-field appearance="outline" class="full-width">
            <mat-label>Subdomain</mat-label>
            <input matInput [(ngModel)]="config.subdomain">
            <span matSuffix>.omrdesk.com</span>
            <i class="fa-thin fa-link" matSuffix></i>
          </mat-form-field>
        </div>
        <div class="form-section">
          <label>Contact Info</label>
          <div class="input-grid">
            <mat-form-field appearance="outline">
              <mat-label>Support Email</mat-label>
              <input matInput [(ngModel)]="config.supportEmail">
              <i class="fa-thin fa-envelope" matSuffix></i>
            </mat-form-field>
            <mat-form-field appearance="outline">
              <mat-label>Phone</mat-label>
              <input matInput [(ngModel)]="config.phone">
              <i class="fa-thin fa-phone" matSuffix></i>
            </mat-form-field>
          </div>
        </div>
      </div>
    </mat-tab>
  </mat-tab-group>

  <div class="dialog-actions">
    <button mat-button mat-dialog-close>Cancel</button>
    <button mat-raised-button color="primary" (click)="save()" class="save-btn">
      <i class="fa-thin fa-check"></i> Apply Settings
    </button>
  </div>
</div>
