<div class="dialog-container">
  <div class="dialog-content">
    <!-- Floating Close Button -->
    <button mat-icon-button mat-dialog-close class="floating-close-btn" aria-label="Close preview">
      <mat-icon>close</mat-icon>
    </button>

    <!-- Floating Selection Button -->
    <button mat-raised-button color="primary" class="floating-select-btn" (click)="selectTemplate()">
      <mat-icon>check_circle</mat-icon> Use This Template
    </button>
    <div class="preview-main">
      <!-- Image-based Monitor Mockup -->
      <div class="device-mockup">
        <img src="/images/apple-monitor.png" 
             alt="Apple Monitor" class="monitor-image">
        
        <div class="screen-overlay">
          <!-- Browser Frame Mockup -->
          <div class="browser-frame">
            <div class="browser-header">
          <div class="dots"><span></span><span></span><span></span></div>
          <div class="address-bar">
            <mat-icon>lock</mat-icon>
            https://{{getSlug()}}.omrdesk.com
          </div>
        </div>

        <div class="preview-scroll" #previewScroll *ngIf="!isLoading">
          <iframe [srcdoc]="safeSrcDoc" 
                  class="preview-iframe"
                  [style.transform]="'scale(' + iframeScale + ')'"
                  [style.height.%]="iframeHeightPercent"
                  title="Template Preview">
          </iframe>
        </div>

        <div *ngIf="isLoading" style="display: flex; justify-content: center; align-items: center; height: 100%;">
          <mat-spinner diameter="40"></mat-spinner>
        </div>

          </div><!-- /browser-frame -->
        </div><!-- /screen-overlay -->
      </div><!-- /device-mockup -->
      
  </div>
</div>
