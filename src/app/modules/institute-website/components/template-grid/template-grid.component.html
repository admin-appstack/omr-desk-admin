<div class="template-section">

  <div class="section-lead">
    <h2>Select a Template</h2>
    <p>Choose a design that best represents your institute's brand. You can customize colors and content after selection.</p>
  </div>

  <div class="template-grid">
    <div 
      *ngFor="let tpl of templates" 
      class="template-card" 
      [class.selected]="selectedId === tpl.id"
      (click)="selectTemplate(tpl.id)"
    >
      <!-- Selected Badge -->
      <div class="selected-badge" *ngIf="selectedId === tpl.id">
        <mat-icon>check</mat-icon> Active
      </div>





      <!-- Info -->
      <div class="template-info">
        <div class="template-header">
          <h3>{{tpl.name}}</h3>
          <div class="template-tags">
            <span *ngFor="let tag of tpl.tags" class="tag">{{tag}}</span>
          </div>
        </div>
        <div class="template-skeleton website-mock">
          <!-- Mini Website Header -->
          <div class="mock-header">
            <div class="mock-logo"></div>
            <div class="mock-nav">
              <div class="mock-nav-item"></div>
              <div class="mock-nav-item"></div>
              <div class="mock-nav-item"></div>
            </div>
          </div>
          <!-- Mini Website Hero -->
          <div class="mock-hero">
            <div class="mock-hero-title"></div>
            <div class="mock-hero-text"></div>
          </div>
          <!-- Mini Website Grid -->
          <div class="mock-grid">
            <div class="mock-card"></div>
            <div class="mock-card"></div>
            <div class="mock-card"></div>
          </div>
        </div>

        <div class="card-actions">
          <button 
            mat-stroked-button 
            class="preview-btn"
            (click)="$event.stopPropagation(); openPreview(tpl)"
          >
            <mat-icon>visibility</mat-icon> Preview
          </button>
          <button 
            mat-raised-button 
            class="use-template-btn"
            [style.background]="selectedId === tpl.id ? tpl.primaryColor : ''"
            (click)="$event.stopPropagation(); selectTemplate(tpl.id)"
          >
            <mat-icon>{{ selectedId === tpl.id ? 'check_circle' : 'web' }}</mat-icon>
            {{ selectedId === tpl.id ? 'Active' : 'Use Template' }}
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
