<div class="template-section">

  <div class="section-lead">
    <h2>Select a Template</h2>
    <p>Choose a design that best represents your institute's brand. You can customize colors and content after selection.</p>
  </div>

  <div *ngIf="isLoading" style="display: flex; justify-content: center; padding: 4rem;">
    <mat-spinner diameter="40"></mat-spinner>
  </div>

  <div class="template-grid" *ngIf="!isLoading">
    <div 
      *ngFor="let tpl of templates" 
      class="template-card" 
      [class.selected]="selectedId === tpl.id"
      [style.borderColor]="selectedId === tpl.id ? tpl.primaryColor : ''"
      (click)="selectTemplate(tpl.id)"
    >
      <!-- Preview Image with Swatch Badge -->
      <div class="template-preview">
        <img [src]="tpl.previewImage" [alt]="tpl.name">
        
        <!-- Hover overlay icon -->
        <div class="preview-overlay">
          <i class="fa-thin fa-magnifying-glass-plus"></i>
        </div>

        <!-- Floating Color Indicator Swatch -->
        <div class="color-swatch-badge" [style.background]="tpl.primaryColor" title="Template Theme Color"></div>
      </div>

      <!-- Info -->
      <div class="template-info">
        <div class="template-header">
          <div class="title-row">
            <h3>{{tpl.name}}</h3>
            <span class="active-badge-pill" *ngIf="selectedId === tpl.id" [style.background]="tpl.primaryColor">
              <i class="fa-thin fa-check"></i> Active
            </span>
          </div>
          <p class="template-desc">{{tpl.description}}</p>
          <div class="template-tags">
            <span *ngFor="let tag of tpl.tags" class="tag" [style.color]="tpl.primaryColor" [style.background]="tpl.primaryColor + '15'">{{tag}}</span>
          </div>
        </div>

        <div class="card-actions">
          <button 
            mat-stroked-button 
            class="preview-btn"
            [style.color]="tpl.primaryColor"
            [style.borderColor]="tpl.primaryColor + '30'"
            (click)="$event.stopPropagation(); openPreview(tpl)"
          >
            <i class="fa-thin fa-eye"></i> Preview
          </button>
          <button 
            mat-raised-button 
            class="use-template-btn"
            [style.background]="tpl.primaryColor"
            (click)="$event.stopPropagation(); selectTemplate(tpl.id)"
          >
            <i [class]="selectedId === tpl.id ? 'fa-thin fa-circle-check' : 'fa-thin fa-browser'"></i>
            {{ selectedId === tpl.id ? 'Active' : 'Use Template' }}
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
