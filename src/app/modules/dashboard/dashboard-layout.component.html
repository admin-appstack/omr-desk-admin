<mat-sidenav-container class="dashboard-container">

  <!-- Sidebar -->
  <mat-sidenav 
    mode="side" 
    opened 
    class="sidebar"
    [class.collapsed]="isSidebarCollapsed()"
  >
    <!-- Logo -->
    <div class="sidebar-header">
      <div class="logo-wrapper">
        <img src="ORMDesk_Logo.png" alt="OMRDesk Logo" class="logo-img" />
      </div>
    </div>

    <!-- Navigation -->
    <div class="nav-section-label" *ngIf="!isSidebarCollapsed()">MAIN MENU</div>
    <mat-nav-list class="nav-list">
      <a 
        mat-list-item 
        *ngFor="let item of navItems" 
        [routerLink]="item.route" 
        routerLinkActive="active-link"
        [matTooltip]="isSidebarCollapsed() ? item.label : ''"
        matTooltipPosition="right"
      >
        <mat-icon matListItemIcon>{{ item.icon }}</mat-icon>
        <span matListItemTitle *ngIf="!isSidebarCollapsed()">{{ item.label }}</span>
      </a>
    </mat-nav-list>

    <!-- Footer -->
    <div class="sidebar-footer">
      <button mat-icon-button (click)="toggleSidebar()" class="collapse-btn">
        <mat-icon>{{ isSidebarCollapsed() ? 'chevron_right' : 'chevron_left' }}</mat-icon>
      </button>
    </div>
  </mat-sidenav>

  <!-- Main Content -->
  <mat-sidenav-content class="content-area">

    <!-- Top Bar -->
    <mat-toolbar class="top-bar">
      <div class="toolbar-left">
        <span class="page-title">Dashboard</span>
      </div>
      
      <div class="toolbar-right">
        <!-- Search -->
        <div class="search-wrap" *ngIf="!isSidebarCollapsed()">
          <mat-icon>search</mat-icon>
          <input type="text" placeholder="Search anything..." />
        </div>

        <!-- Notification -->
        <button mat-icon-button class="toolbar-icon-btn" matTooltip="Notifications">
          <div class="notif-wrapper">
            <mat-icon>notifications</mat-icon>
            <span class="badge">3</span>
          </div>
        </button>

        <!-- Help -->
        <button mat-icon-button class="toolbar-icon-btn" matTooltip="Help">
          <mat-icon>help_outline</mat-icon>
        </button>

        <div class="divider-v"></div>

        <!-- User Profile -->
        <div class="user-profile">
          <div class="user-info">
            <span class="user-name">{{ user?.name || 'Administrator' }}</span>
            <span class="user-role">Institute Admin</span>
          </div>
          <button mat-icon-button [matMenuTriggerFor]="profileMenu" class="avatar-btn">
            <div class="avatar-circle">
              {{ (user?.name || 'A').charAt(0) }}
            </div>
          </button>
          
          <mat-menu #profileMenu="matMenu" class="profile-menu">
            <button mat-menu-item>
              <mat-icon>manage_accounts</mat-icon>
              <span>My Profile</span>
            </button>
            <button mat-menu-item [routerLink]="['/dashboard/settings']">
              <mat-icon>settings</mat-icon>
              <span>Settings</span>
            </button>
            <mat-divider></mat-divider>
            <button mat-menu-item (click)="signOut()" class="sign-out-item">
              <mat-icon>logout</mat-icon>
              <span>Sign Out</span>
            </button>
          </mat-menu>
        </div>
      </div>
    </mat-toolbar>

    <main class="main-viewport">
      <router-outlet></router-outlet>
    </main>

  </mat-sidenav-content>
</mat-sidenav-container>
