<div class="dialog-container">
  <div class="dialog-header indigo">
    <div class="header-content">
      <mat-icon>{{ data ? 'edit' : 'person_add' }}</mat-icon>
      <h2>{{ data ? 'Edit User' : 'Add New User' }}</h2>
    </div>
    <button mat-icon-button (click)="close()" class="close-btn">
      <mat-icon>close</mat-icon>
    </button>
  </div>

  <div class="dialog-body">
    <p class="dialog-subtitle">Configure user details and system access.</p>
    
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Full Name</mat-label>
      <input matInput placeholder="e.g. John Doe" [(ngModel)]="userName">
      <mat-icon matPrefix class="input-icon">person</mat-icon>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Email Address</mat-label>
      <input matInput type="email" placeholder="john.doe@example.com" [(ngModel)]="userEmail">
      <mat-icon matPrefix class="input-icon">email</mat-icon>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Assign Role</mat-label>
      <mat-select [(ngModel)]="userRole">
        <mat-option value="Super Admin">Super Admin</mat-option>
        <mat-option value="Admin">Admin</mat-option>
        <mat-option value="Editor">Editor</mat-option>
        <mat-option value="Viewer">Viewer</mat-option>
      </mat-select>
      <mat-icon matPrefix class="input-icon">security</mat-icon>
    </mat-form-field>
  </div>

  <div class="dialog-footer">
    <button mat-button (click)="close()" class="cancel-btn">Cancel</button>
    <button mat-raised-button (click)="save()" class="save-btn" [disabled]="!userName || !userEmail || !userRole">
      <mat-icon>check_circle</mat-icon> {{ data ? 'Save Changes' : 'Add User' }}
    </button>
  </div>
</div>
