<div class="settings-box">
  <h2 class="box-title">Set Labels</h2>
  <div class="form-row">
    <div class="form-field">
      <label>Select Label</label>
      <select class="custom-select" (change)="onLabelChange($event)">
        <option>Add new</option>
        <option selected>Label Name Options</option>
        <option>Default</option>
      </select>
    </div>
    <button mat-icon-button class="edit-btn">
      <i class="fa-thin fa-pen"></i>
    </button>
  </div>
</div>

<!-- Add Label Modal -->
@if (showAddLabelModal()) {
  <app-add-label-modal (close)="closeAddLabelModal()"></app-add-label-modal>
}
