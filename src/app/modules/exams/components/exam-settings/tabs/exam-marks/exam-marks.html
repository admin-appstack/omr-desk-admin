<div class="exam-marks-content">
  @for (subject of subjects; track subject.name) {
    <div class="subject-group">
      <h2 class="subject-title">{{ subject.name }}</h2>
      <div class="cards-list">
        @for (section of subject.sections; track section.id) {
          <div class="data-card">
            <div class="left-info">
              <span class="sr-no">{{ section.id }}</span>
              <span class="name">{{ section.name }}</span>
            </div>
            <div class="right-actions">
              <div class="status-item positive">
                <i class="fa-thin fa-circle-check"></i>
                <span>{{ section.correct }}</span>
              </div>
              <div class="status-item negative">
                <i class="fa-thin fa-circle-xmark"></i>
                <span>{{ section.incorrect }}</span>
              </div>
              <button mat-icon-button class="action-btn" (click)="openSectionModal(section)">
                <i class="fa-thin fa-gear"></i>
              </button>
            </div>
          </div>
        }
      </div>
    </div>
  }
</div>

<!-- Section Settings Modal -->
@if (showSectionModal()) {
  <app-section-settings-modal [section]="selectedSection()" (close)="closeSectionModal()"></app-section-settings-modal>
}
