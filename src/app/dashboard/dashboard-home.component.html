<div class="dashboard-home-content">
  <!-- Stats Row -->
  <div class="stats-grid">
    <mat-card *ngFor="let stat of stats" class="stat-card">
      <div class="stat-icon" [style.background-color]="stat.color + '15'">
        <mat-icon [style.color]="stat.color">{{ stat.icon }}</mat-icon>
      </div>
      <div class="stat-info">
        <span class="stat-label">{{ stat.label }}</span>
        <h2 class="stat-value">{{ stat.value }}</h2>
      </div>
    </mat-card>
  </div>

  <!-- Main Grid -->
  <div class="dashboard-main-grid">
    <!-- Quick Actions -->
    <section class="quick-actions">
      <h3 class="section-title">Quick Actions</h3>
      <div class="actions-grid">
        <button mat-flat-button *ngFor="let action of quickActions" class="action-tile">
          <mat-icon>{{ action.icon }}</mat-icon>
          <div class="action-content">
            <span class="action-label">{{ action.label }}</span>
            <span class="action-desc">{{ action.description }}</span>
          </div>
        </button>
      </div>
    </section>

    <!-- Recent Activity Placeholder -->
    <section class="recent-activity">
      <h3 class="section-title">Recent Activity</h3>
      <mat-card class="activity-card">
        <div class="empty-state">
          <mat-icon>history</mat-icon>
          <p>No recent activities found.</p>
        </div>
      </mat-card>
    </section>
  </div>
</div>
